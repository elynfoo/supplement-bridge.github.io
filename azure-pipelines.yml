trigger:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  nodeVersion: '22.x'
  azureServiceConnection: 'AzureServiceConnection'

stages:

# ── Stage 1: Build ────────────────────────────────────────────────────────────
- stage: Build
  displayName: Build Frontend & Backend
  jobs:

  - job: Build
    displayName: Build & Package
    steps:
    - task: UseNode@1
      inputs:
        version: $(nodeVersion)
      displayName: Install Node.js

    - script: |
        npm install
        npm run build
      workingDirectory: frontend
      displayName: Build React Frontend

    - script: |
        npm install
        npm test --if-present
      workingDirectory: backend
      displayName: Install & Test Backend

    - script: |
        echo Build dir contents:
        dir frontend
        dir frontend\build
        xcopy /E /I /Y frontend\build backend\public
      displayName: Copy Frontend into Backend

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: backend
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/app.zip
        replaceExistingArchive: true
        excludePaths: backend/node_modules
      displayName: Zip App

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)/app.zip
        artifact: app
      displayName: Publish Artifact

# ── Stage 2: Deploy to Dev ────────────────────────────────────────────────────
- stage: DeployDev
  displayName: Deploy to Dev
  dependsOn: Build
  condition: succeeded()
  jobs:

  - deployment: DeployDev
    displayName: Deploy → Dev
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: webAppLinux
              appName: supplement-bridge-dev
              package: $(Pipeline.Workspace)/app/app.zip
              runtimeStack: 'NODE|22-lts'
            displayName: Deploy to App Service (Dev)

# ── Stage 3: Deploy to Production ────────────────────────────────────────────
- stage: DeployProd
  displayName: Deploy to Production
  dependsOn: DeployDev
  condition: succeeded()
  jobs:

  - deployment: DeployProd
    displayName: Deploy → Prod
    environment: prod
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: $(azureServiceConnection)
              appType: webAppLinux
              appName: supplement-bridge
              package: $(Pipeline.Workspace)/app/app.zip
              runtimeStack: 'NODE|22-lts'
            displayName: Deploy to App Service (Prod)
